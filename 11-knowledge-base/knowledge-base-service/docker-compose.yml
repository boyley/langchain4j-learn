version: '3.8'

# ============================================================
# 企业知识库服务 - Docker Compose 部署
#
# 启动命令: docker-compose up -d
# 停止命令: docker-compose down
# 查看日志: docker-compose logs -f
# ============================================================

services:

  # ==================== MySQL 数据库 ====================
  mysql:
    image: mysql:8.0
    container_name: knowledge-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: knowledge_db
      MYSQL_USER: knowledge
      MYSQL_PASSWORD: knowledge123
    volumes:
      - mysql-data:/var/lib/mysql
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

  # ==================== Redis (向量存储) ====================
  redis-stack:
    image: redis/redis-stack:latest
    container_name: knowledge-redis
    ports:
      - "6379:6379"
      - "8001:8001"  # RedisInsight Web UI
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 5s
      retries: 10

  # ==================== PostgreSQL + pgvector (备选向量存储) ====================
  # 如果使用 pgvector，取消下面的注释
  # postgres:
  #   image: pgvector/pgvector:pg16
  #   container_name: knowledge-postgres
  #   ports:
  #     - "5432:5432"
  #   environment:
  #     POSTGRES_USER: postgres
  #     POSTGRES_PASSWORD: postgres
  #     POSTGRES_DB: knowledge_db
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U postgres"]
  #     timeout: 5s
  #     retries: 10

  # ==================== Milvus (大规模向量存储) ====================
  # 如果需要 Milvus，取消下面的注释
  # etcd:
  #   image: quay.io/coreos/etcd:v3.5.5
  #   container_name: knowledge-etcd
  #   environment:
  #     - ETCD_AUTO_COMPACTION_MODE=revision
  #     - ETCD_AUTO_COMPACTION_RETENTION=1000
  #     - ETCD_QUOTA_BACKEND_BYTES=4294967296
  #   command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379
  #
  # minio:
  #   image: minio/minio:RELEASE.2023-03-20T20-16-18Z
  #   container_name: knowledge-minio
  #   environment:
  #     MINIO_ACCESS_KEY: minioadmin
  #     MINIO_SECRET_KEY: minioadmin
  #   command: minio server /data --console-address ":9001"
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
  #     timeout: 20s
  #     retries: 3
  #
  # milvus:
  #   image: milvusdb/milvus:v2.3.3
  #   container_name: knowledge-milvus
  #   ports:
  #     - "19530:19530"
  #     - "9091:9091"
  #   depends_on:
  #     - etcd
  #     - minio
  #   environment:
  #     ETCD_ENDPOINTS: etcd:2379
  #     MINIO_ADDRESS: minio:9000

  # ==================== 知识库服务 ====================
  knowledge-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: knowledge-service
    ports:
      - "8080:8080"
    environment:
      # 数据库配置
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      # OpenAI 配置 (从 .env 文件读取)
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      # Redis 配置
      REDIS_HOST: redis-stack
      REDIS_PORT: 6379
      # 向量存储类型
      KNOWLEDGE_VECTOR_STORE_TYPE: redis
    depends_on:
      mysql:
        condition: service_healthy
      redis-stack:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      timeout: 10s
      retries: 5

volumes:
  mysql-data:
  redis-data:
  postgres-data:
